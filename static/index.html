<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>诗歌生成台</title>
    <style>
      :root {
        --ink: #171512;
        --muted: #6f675b;
        --paper: #f6f0e4;
        --paper-deep: #e5d6bd;
        --cinnabar: #b62f22;
        --moss: #2f5c4c;
        --lapis: #28476f;
        --line: rgba(23, 21, 18, 0.18);
        --shadow: rgba(58, 43, 24, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
        background:
          linear-gradient(90deg, rgba(23, 21, 18, 0.035) 1px, transparent 1px) 0 0 / 34px 34px,
          radial-gradient(circle at 18% 16%, rgba(182, 47, 34, 0.16), transparent 28%),
          radial-gradient(circle at 82% 8%, rgba(47, 92, 76, 0.17), transparent 26%),
          linear-gradient(135deg, #f9f2e7 0%, #e9dcc6 100%);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .shell {
        width: min(1180px, calc(100vw - 36px));
        margin: 0 auto;
        padding: 30px 0 36px;
      }

      .topbar {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        padding-bottom: 18px;
        border-bottom: 2px solid var(--ink);
      }

      .brand {
        display: grid;
        gap: 4px;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 5.5vw, 72px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
      }

      .status {
        min-width: 236px;
        padding: 12px 14px;
        border-left: 4px solid var(--lapis);
        background: rgba(255, 255, 255, 0.28);
        box-shadow: 0 14px 36px var(--shadow);
      }

      .status strong {
        display: block;
        margin-bottom: 3px;
      }

      .layout {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        gap: 18px;
        margin-top: 24px;
      }

      .panel {
        border: 1px solid var(--line);
        background: rgba(255, 252, 244, 0.72);
        box-shadow: 0 22px 60px var(--shadow);
      }

      .controls {
        padding: 18px;
        align-self: start;
        position: sticky;
        top: 20px;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 17px;
      }

      label {
        color: var(--muted);
        font-size: 13px;
      }

      input[type="text"],
      input[type="number"],
      select {
        width: 100%;
        border: 0;
        border-bottom: 2px solid var(--ink);
        background: transparent;
        color: var(--ink);
        padding: 9px 2px;
        outline: none;
        font-size: 22px;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: var(--cinnabar);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--cinnabar);
      }

      .temperature-line {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .check-field {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 2px 0 18px;
        padding: 11px 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr 46px;
        gap: 10px;
        margin-top: 22px;
      }

      button {
        min-height: 46px;
        border: 2px solid var(--ink);
        color: var(--paper);
        background: var(--ink);
        cursor: pointer;
        transition: transform 160ms ease, background 160ms ease, color 160ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
        transform: none;
      }

      .ghost {
        background: transparent;
        color: var(--ink);
      }

      .output {
        min-height: 440px;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .output-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 15px 18px;
        border-bottom: 1px solid var(--line);
      }

      .output-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .poem {
        margin: 0;
        padding: 24px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: clamp(22px, 3vw, 34px);
        line-height: 1.72;
        writing-mode: vertical-rl;
        overflow-x: auto;
        min-height: 360px;
        max-height: 640px;
      }

      .empty {
        color: var(--muted);
        font-size: 20px;
      }

      .error {
        color: var(--cinnabar);
      }

      @media (max-width: 860px) {
        .topbar,
        .layout {
          grid-template-columns: 1fr;
          display: grid;
        }

        .controls {
          position: static;
        }

        .poem {
          writing-mode: horizontal-tb;
          font-size: 24px;
          min-height: 260px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <h1>Transformer 试诗台</h1>
        </div>
        <aside class="status" id="status">
          <strong>检查模型中</strong>
          <span>正在读取 checkpoint</span>
        </aside>
      </header>

      <section class="layout">
        <form class="panel controls" id="form">
          <div class="field">
            <label for="start">起始文字</label>
            <input id="start" name="start" type="text" value="春" maxlength="12" />
          </div>

          <div class="field">
            <label for="poemForm">体裁</label>
            <select id="poemForm" name="poemForm">
              <option value="五言绝句">五言绝句</option>
              <option value="七言绝句" selected>七言绝句</option>
              <option value="五言律诗">五言律诗</option>
              <option value="七言律诗">七言律诗</option>
            </select>
          </div>

          <div class="field">
            <div class="temperature-line">
              <label for="temperature">温度</label>
              <span id="temperatureValue">0.6</span>
            </div>
            <input id="temperature" name="temperature" type="range" min="0" max="1.6" step="0.1" value="0.6" />
          </div>

          <div class="field">
            <label for="length">续写字数</label>
            <input id="length" name="length" type="number" min="10" max="240" value="80" />
          </div>

          <div class="row">
            <div class="field">
              <label for="topk">Top-k</label>
              <input id="topk" name="topk" type="number" min="0" max="200" value="40" />
            </div>
            <div class="field">
              <label for="candidates">候选数</label>
              <input id="candidates" name="candidates" type="number" min="1" max="50" value="50" />
            </div>
          </div>

          <div class="field">
            <div class="temperature-line">
              <label for="repetitionPenalty">重复惩罚</label>
              <span id="repetitionPenaltyValue">1.50</span>
            </div>
            <input id="repetitionPenalty" name="repetitionPenalty" type="range" min="1" max="2.5" step="0.05" value="1.5" />
          </div>

          <div class="field">
            <label for="repetitionWindow">惩罚窗口</label>
            <input id="repetitionWindow" name="repetitionWindow" type="number" min="8" max="240" value="64" />
          </div>

          <label class="check-field" for="adaptiveTemperature">
            <span>自适应温度</span>
            <input id="adaptiveTemperature" name="adaptiveTemperature" type="checkbox" checked />
          </label>

          <div class="button-row">
            <button id="generate" type="submit">生成</button>
            <button class="ghost" id="clear" type="button" title="清空输出">×</button>
          </div>
        </form>

        <section class="panel output">
          <div class="output-head">
            <h2>模型输出</h2>
            <span class="meta" id="runMeta">等待生成</span>
          </div>
          <pre class="poem empty" id="poem">点“生成”后，这里会显示训练模型续写的诗句。</pre>
        </section>
      </section>
    </main>

    <script>
      const form = document.querySelector("#form");
      const statusBox = document.querySelector("#status");
      const poem = document.querySelector("#poem");
      const runMeta = document.querySelector("#runMeta");
      const generateButton = document.querySelector("#generate");
      const temperature = document.querySelector("#temperature");
      const temperatureValue = document.querySelector("#temperatureValue");
      const repetitionPenalty = document.querySelector("#repetitionPenalty");
      const repetitionPenaltyValue = document.querySelector("#repetitionPenaltyValue");

      temperature.addEventListener("input", () => {
        temperatureValue.textContent = Number(temperature.value).toFixed(1);
      });

      repetitionPenalty.addEventListener("input", () => {
        repetitionPenaltyValue.textContent = Number(repetitionPenalty.value).toFixed(2);
      });

      document.querySelector("#clear").addEventListener("click", () => {
        poem.textContent = "";
        poem.classList.add("empty");
        runMeta.textContent = "已清空";
      });

      function setStatus(payload) {
        if (payload.ready) {
          statusBox.innerHTML = `<strong>模型已加载</strong><span>可以生成</span>`;
          statusBox.classList.remove("error");
        } else {
          statusBox.innerHTML = `<strong>模型暂不能加载</strong><span>${payload.error || "缺少依赖"}</span>`;
          statusBox.classList.add("error");
        }
      }

      async function loadStatus() {
        const res = await fetch("/api/status");
        const payload = await res.json();
        setStatus(payload);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        poem.classList.remove("empty");
        poem.textContent = "生成中...";
        runMeta.textContent = "模型采样中";
        generateButton.disabled = true;
        try {
          const payload = {
            start: document.querySelector("#start").value,
            form: document.querySelector("#poemForm").value,
            temperature: Number(document.querySelector("#temperature").value),
            max_new_tokens: Number(document.querySelector("#length").value),
            top_k: document.querySelector("#topk").value || null,
            repetition_penalty: Number(document.querySelector("#repetitionPenalty").value),
            repetition_window: Number(document.querySelector("#repetitionWindow").value),
            candidates: Number(document.querySelector("#candidates").value),
            adaptive_temperature: document.querySelector("#adaptiveTemperature").checked,
          };
          const res = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok || data.error) {
            throw new Error(data.missing ? `${data.error}: ${data.missing}` : data.error);
          }
          poem.textContent = data.text;
          runMeta.textContent = `${data.elapsed_ms} ms · ${data.device} · ${data.settings.candidates} 选 1`;
        } catch (error) {
          poem.textContent = error.message;
          poem.classList.add("empty");
          runMeta.textContent = "生成失败";
        } finally {
          generateButton.disabled = false;
        }
      });

      loadStatus().catch((error) => {
        setStatus({ ready: false, error: error.message });
      });
    </script>
  </body>
</html>
